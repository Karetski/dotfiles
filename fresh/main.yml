---
- name: Ensure ~/.config/fresh exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/fresh"
    state: directory
    mode: '0755'

- name: Deploy Fresh config
  copy:
    src: files/config.json
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/fresh/config.json"
    mode: '0644'
    backup: yes
