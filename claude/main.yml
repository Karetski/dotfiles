---
- name: Check if claude is installed
  shell: "which claude"
  register: claude_check
  ignore_errors: true
  changed_when: false
  tags: [claude]

- name: Install claude if not present
  shell: "curl -sSL https://claude.ai/install.sh | sh"
  when: claude_check.rc != 0
  tags: [claude]

- name: Ensure ~/.claude/hooks exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.claude/hooks"
    state: directory
    mode: '0755'

- name: Deploy Claude settings
  template:
    src: templates/settings.json.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/settings.json"
    mode: '0644'
    backup: yes

- name: Deploy notify hook
  copy:
    src: files/notify.sh
    dest: "{{ ansible_facts['env']['HOME'] }}/.claude/hooks/notify.sh"
    mode: '0755'
    backup: yes
