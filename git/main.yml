---
- name: Ensure ~/.config/git exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/git"
    state: directory
    mode: '0755'

- name: Deploy gitconfig
  template:
    src: templates/gitconfig.j2
    dest: "{{ ansible_facts['env']['HOME'] }}/.gitconfig"
    mode: '0644'
    backup: yes

- name: Deploy git attributes
  copy:
    src: files/attributes
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/attributes"
    mode: '0644'

- name: Deploy git ignore
  copy:
    src: files/ignore
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/git/ignore"
    mode: '0644'
