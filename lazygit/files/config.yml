gui:
  theme:
    selectedLineBgColor:
      - white
customCommands:
  - key: "p"
    context: "files"
    command: 'ext="{{.SelectedFile.Name}}"; [[ "$ext" =~ \.(png|jpg|jpeg|gif|webp|pdf|mp4|mov|avi|mkv|heic|tiff|bmp|svg)$ ]] && qlmanage -p "$ext" &>/dev/null'
    description: "Quick Look"
  - key: "p"
    context: "commitFiles"
    command: 'ext="{{.SelectedCommitFile.Name}}"; [[ "$ext" =~ \.(png|jpg|jpeg|gif|webp|pdf|mp4|mov|avi|mkv|heic|tiff|bmp|svg)$ ]] && qlmanage -p "$ext" &>/dev/null'
    description: "Quick Look"
