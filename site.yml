---
- name: Configure macOS development environment
  hosts: all
  gather_facts: true
  vars_files: [vars/main.yml]

  tasks:
    - import_tasks: homebrew/main.yml
      tags: [homebrew]

    - import_tasks: zsh/main.yml
      tags: [zsh]

    - import_tasks: git/main.yml
      tags: [git]

    - import_tasks: lazygit/main.yml
      tags: [lazygit]

    - import_tasks: claude/main.yml
      tags: [claude]

    - import_tasks: ghostty/main.yml
      tags: [ghostty]

    - import_tasks: micro/main.yml
      tags: [micro]
